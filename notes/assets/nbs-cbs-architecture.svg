<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#111">NBS-CBS Architecture — the five components</text>
  <text x="550" y="52" text-anchor="middle" font-size="13" fill="#555">Hybrid ANN (black-box) + CBR (white-box) over the Urban Nature Atlas</text>

  <!-- User input -->
  <ellipse cx="130" cy="120" rx="85" ry="26" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="130" y="117" text-anchor="middle" font-size="12" font-weight="600" fill="#111">User</text>
  <text x="130" y="133" text-anchor="middle" font-size="11" fill="#333">target case</text>

  <!-- Component 2: Input Encoder -->
  <rect x="30" y="195" width="240" height="175" rx="8" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="150" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#111">2. Input Collector &amp; Encoder</text>
  <text x="150" y="240" text-anchor="middle" font-size="11" fill="#333">6 problem features:</text>
  <text x="46" y="260" font-size="11" fill="#333">• challenges addressed</text>
  <text x="46" y="276" font-size="11" fill="#333">• project initiator(s)</text>
  <text x="46" y="292" font-size="11" fill="#333">• climate zone</text>
  <text x="46" y="308" font-size="11" fill="#333">• scale</text>
  <text x="46" y="324" font-size="11" fill="#333">• cost</text>
  <text x="46" y="340" font-size="11" fill="#333">• description keywords</text>
  <text x="150" y="360" text-anchor="middle" font-size="10" font-style="italic" fill="#555">encodes to machine-readable form</text>

  <!-- Component 1: Case Repository -->
  <rect x="430" y="195" width="240" height="175" rx="8" fill="#e8f4ea" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="550" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#111">1. Case Repository</text>
  <text x="550" y="240" text-anchor="middle" font-size="11" fill="#333">Urban Nature Atlas (UNA)</text>
  <text x="550" y="256" text-anchor="middle" font-size="11" fill="#333">~1,100 EU NbS cases</text>
  <text x="446" y="284" font-size="11" fill="#333">• general info</text>
  <text x="446" y="300" font-size="11" fill="#333">• problem features</text>
  <text x="446" y="316" font-size="11" fill="#333">• solution feature</text>
  <text x="446" y="332" font-size="11" fill="#333">  (implemented NbS category)</text>
  <text x="550" y="360" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">knowledge base + core of a CBS</text>

  <!-- Component 3: ANN (BLACK-BOX) -->
  <rect x="830" y="170" width="240" height="220" rx="8" fill="#2b2b2b" stroke="#111" stroke-width="1.5"/>
  <text x="950" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#ffd400">🔲 BLACK-BOX</text>
  <text x="950" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#eee">3. ANN Classifier</text>
  <text x="950" y="236" text-anchor="middle" font-size="11" fill="#ccc">deep NN, 2 hidden layers</text>
  <text x="950" y="252" text-anchor="middle" font-size="11" fill="#ccc">pre-trained on case repository</text>
  <line x1="850" y1="266" x2="1050" y2="266" stroke="#555" stroke-width="1"/>
  <text x="950" y="284" text-anchor="middle" font-size="11" fill="#eee">→ predicts NbS category</text>
  <text x="950" y="300" text-anchor="middle" font-size="11" fill="#eee">with prediction probability</text>
  <text x="950" y="322" text-anchor="middle" font-size="10" fill="#aaa">8 categories: blue infra,</text>
  <text x="950" y="338" text-anchor="middle" font-size="10" fill="#aaa">green for water mgmt,</text>
  <text x="950" y="354" text-anchor="middle" font-size="10" fill="#aaa">parks &amp; urban forests,</text>
  <text x="950" y="370" text-anchor="middle" font-size="10" fill="#aaa">community gardens, etc.</text>

  <!-- White-box wrapping box -->
  <rect x="260" y="440" width="580" height="210" rx="10" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="285" y="460" font-size="11" font-weight="700" fill="#555">⬜ WHITE-BOX (CBR)</text>

  <!-- Component 4: Case Retrieval -->
  <rect x="290" y="475" width="250" height="160" rx="8" fill="#f4f4f4" stroke="#555" stroke-width="1.5"/>
  <text x="415" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#111">4. Case Retrieval Engine</text>
  <text x="306" y="522" font-size="11" fill="#333">• filter repository to cases</text>
  <text x="306" y="538" font-size="11" fill="#333">  implementing predicted NbS</text>
  <text x="306" y="558" font-size="11" fill="#333">• compute similarity between</text>
  <text x="306" y="574" font-size="11" fill="#333">  target case and filtered cases</text>
  <text x="306" y="594" font-size="11" fill="#333">• return top-N similar cases</text>
  <text x="306" y="610" font-size="11" fill="#333">  with similarity scores</text>

  <!-- Component 5: Adapt & Retain -->
  <rect x="560" y="475" width="250" height="160" rx="8" fill="#f4f4f4" stroke="#555" stroke-width="1.5"/>
  <text x="685" y="498" text-anchor="middle" font-size="13" font-weight="700" fill="#111">5. Case Adaptation &amp; Retain</text>
  <text x="576" y="524" font-size="11" fill="#333">user judges relevance</text>
  <text x="576" y="544" font-size="11" fill="#333">user adapts to local context</text>
  <line x1="576" y1="558" x2="794" y2="558" stroke="#bbb" stroke-width="1"/>
  <text x="576" y="578" font-size="11" fill="#333">solved problem → new case</text>
  <text x="576" y="594" font-size="11" fill="#333">retained in repository</text>
  <text x="685" y="620" text-anchor="middle" font-size="10" font-style="italic" fill="#555">retrieve · reuse · revise · retain</text>

  <!-- Output -->
  <ellipse cx="950" cy="560" rx="115" ry="34" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="950" y="553" text-anchor="middle" font-size="12" font-weight="600" fill="#111">User: adapted NbS plan</text>
  <text x="950" y="572" text-anchor="middle" font-size="10" fill="#333">+ new case added back to repo</text>

  <!-- Solid arrows: runtime data flow -->
  <!-- User -> encoder -->
  <line x1="130" y1="146" x2="150" y2="193" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Encoder -> ANN -->
  <line x1="270" y1="260" x2="828" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="252" text-anchor="middle" font-size="10" fill="#333">encoded features</text>
  <!-- ANN -> Retrieval (hypothesis) -->
  <path d="M 950 392 Q 950 440 540 555" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="735" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#111">hypothesis: NbS category</text>
  <!-- Retrieval -> Adaptation -->
  <line x1="540" y1="555" x2="558" y2="555" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Adaptation -> Output -->
  <line x1="810" y1="558" x2="838" y2="558" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashed arrows: repository relationships -->
  <!-- Repository -> Encoder (structure dictates encoding) -->
  <path d="M 430 300 Q 370 310 270 310" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="350" y="297" text-anchor="middle" font-size="9" font-style="italic" fill="#666">structure dictates encoding</text>
  <!-- Repository -> ANN (trains) -->
  <line x1="670" y1="240" x2="828" y2="240" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="748" y="232" text-anchor="middle" font-size="9" font-style="italic" fill="#666">trains</text>
  <!-- Repository -> Retrieval (source cases) -->
  <path d="M 500 370 Q 470 430 415 470" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="425" y="418" text-anchor="middle" font-size="9" font-style="italic" fill="#666">source cases</text>
  <!-- Adapt -> Repository (retains) -->
  <path d="M 700 475 Q 700 420 610 370" stroke="#888" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="695" y="418" text-anchor="middle" font-size="9" font-style="italic" fill="#666">retains new case</text>

  <!-- Legend -->
  <rect x="30" y="670" width="14" height="10" fill="#2b2b2b" stroke="#111"/>
  <text x="50" y="679" font-size="11" fill="#333">black-box (ANN)</text>
  <rect x="170" y="670" width="14" height="10" fill="#f4f4f4" stroke="#555"/>
  <text x="190" y="679" font-size="11" fill="#333">white-box (CBR)</text>
  <rect x="300" y="670" width="14" height="10" fill="#e8f4ea" stroke="#2e7d32"/>
  <text x="320" y="679" font-size="11" fill="#333">repository</text>
  <line x1="410" y1="675" x2="440" y2="675" stroke="#333" stroke-width="2"/>
  <text x="448" y="679" font-size="11" fill="#333">runtime data flow</text>
  <line x1="570" y1="675" x2="600" y2="675" stroke="#888" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="608" y="679" font-size="11" fill="#333">repository relationships</text>
</svg>
