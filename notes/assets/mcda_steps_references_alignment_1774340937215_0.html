const toolLabel = { gis: "GIS", ai: "AI/ML", mcda: "MCDA", all: "GIS+AI+MCDA", proj: "Project" };

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = steps.map((s, i) =>
    `<div class="tab${i===0?' active':''}" data-i="${i}" onclick="setTab(${i})">Step ${s.num} <span class="count-pill">${s.refs.length}</span></div>`
  ).join("");
}

function setTab(i) {
  document.querySelectorAll(".tab").forEach((t,j) => t.classList.toggle("active", j===i));
  renderContent(i);
}

function renderContent(i) {
  const s = steps[i];
  const el = document.getElementById("content");
  el.innerHTML = `
    <div class="step-header">
      <span class="step-num">${s.num}.</span>
      <span class="step-title">${s.title}</span>
    </div>
    <div class="step-desc">${s.desc}</div>
    <table>
      <thead><tr><th>Reference / Project</th><th>Tool focus</th><th>Region/Context</th><th>Role in this step</th></tr></thead>
      <tbody>${s.refs.map(r => `
        <tr>
          <td><span class="ref-name">${r.name}</span></td>
          <td><span class="badge ${r.tool}">${toolLabel[r.tool]}</span></td>
          <td><span class="ref-detail">${r.region}</span></td>
          <td><span class="ref-detail">${r.detail}</span></td>
        </tr>`).join("")}
      </tbody>
    </table>`;
}

renderTabs();
