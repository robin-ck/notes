  {src:"lia", ref:"Mazzola et al. (2023)", cite:"J. Adolesc. Health, 72(3), 452–459", domain:"Healthcare / patient", role:"Decision support needs for transgender youth and families; addresses patient-centred needs assessment for consensus on care decisions."},
  {src:"lia", ref:"Ayano et al. (2022)", cite:"Diagnostics, 13(1), 111", domain:"Healthcare / heart disease", role:"Explainable ML (SHAP) for heart disease classification; interpretable ML results presented to clinicians to support shared decision-making and consensus."},
 ]},
];

var activeStep = 0;

function renderTabs() {
  document.getElementById("tabs").innerHTML = steps.map(function(s,i){
    return '<div class="tab'+(i===0?' on':'')+'" onclick="setTab('+i+')">Step '+s.num+' <span style="font-size:10px;color:var(--color-text-tertiary)">('+s.refs.length+')</span></div>';
  }).join("");
}

function setTab(i) {
  activeStep = i;
  document.querySelectorAll(".tab").forEach(function(t,j){ t.classList.toggle("on", j===i); });
  renderContent();
}

function renderContent() {
  var s = steps[activeStep];
  var rows = s.refs.map(function(r){
    return '<tr>'
      +'<td><span class="rn">'+r.ref+'</span></td>'
      +'<td><span class="ct">'+r.cite+'</span></td>'
      +'<td><span class="s-'+r.src+'">'+(r.src==='ray'?'Ray 2025':r.src==='sah'?'Sahoo & Goswami 2023':'Liao et al. 2023')+'</span></td>'
      +'<td><span class="rd">'+r.domain+'</span></td>'
      +'<td><span class="rd">'+r.role+'</span></td>'
      +'</tr>';
  }).join("");
  document.getElementById("content").innerHTML =
    '<div class="sh"><span class="sn">'+s.num+'.</span><span class="st">'+s.title+'</span><span class="tc">'+s.refs.length+' references</span></div>'
    +'<div class="sd">'+s.desc+'</div>'
    +'<table><thead><tr><th>Reference</th><th>Citation</th><th>Source paper</th><th>Domain</th><th>Role in this step</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>';
}

renderTabs();
renderContent();
</script>
